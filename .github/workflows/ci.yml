name: Docker CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker-build-push:
    name: docker-build-push
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/body-type-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Local Server
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          echo "==== Pull latest Docker image ===="
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/body-type-api:latest

          echo "==== Remove previous container if exists ===="
          docker rm -f body-type-api-container || true

          echo "==== Run new container ===="
          docker run -d --name body-type-api-container -p 8000:8000 ${{ secrets.DOCKER_HUB_USERNAME }}/body-type-api:latest

          echo "==== Deploy completed ===="
