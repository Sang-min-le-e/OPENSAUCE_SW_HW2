name: Docker CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/body-type-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Local Self-Hosted Runner
    needs: build-and-push
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    
    steps:
      - name: Deploy to Local Server
        shell: powershell
        run: |
          Write-Host "==== Pull latest Docker image ===="
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/body-type-api:latest

          Write-Host "==== Remove previous container if exists ===="
          try {
              docker rm -f body-type-api-container 2>$null
          } catch {
              Write-Host "No previous container found."
          }

          Write-Host "==== Run new container ===="
          docker run -d --name body-type-api-container -p 8000:8000 ${{ secrets.DOCKER_HUB_USERNAME }}/body-type-api:latest

          Write-Host "==== Deploy completed ===="

      - name: Write checklist to summary
        shell: powershell
        run: |
          $summary = @"
          ## Check your repository Actions
          
          - [x] **Build and Push Docker Image** job가 성공했는지 확인
          - [x] **Deploy to Local Server** step이 성공했는지 확인 (PR이면 배포 스킵)
          - [ ] 로컬에서 http://127.0.0.1:8000 접속 후 Ctrl + F5
          - [ ] 사람 사진 업로드 → 정상 결과
          - [ ] 사람 미검출 사진 업로드 → 에러 메시지 + 재업로드 유도
          
          ### Where to look when deploy fails
          - docker command not found: 러너에 Docker 설치/PATH 확인
          - pull access denied: Docker Hub 시크릿/권한 확인
          - port is already allocated: 8000 포트 충돌 확인
          - 컨테이너 로그: docker logs body-type-api-container
          "@
          Out-File -FilePath $env:GITHUB_STEP_SUMMARY -InputObject $summary -Append -Encoding utf8
