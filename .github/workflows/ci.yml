name: Docker CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker-build-push:
    name: docker-build-push
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/body-type-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Local Server
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          echo "==== Pull latest Docker image ===="
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/body-type-api:latest

          echo "==== Remove previous container if exists ===="
          docker rm -f body-type-api-container || true

          echo "==== Run new container ===="
          docker run -d --name body-type-api-container -p 8000:8000 ${{ secrets.DOCKER_HUB_USERNAME }}/body-type-api:latest

          echo "==== Deploy completed ===="

      - name: Write checklist to summary
        shell: bash
        run: |
          {
            echo "## Check your repository Actions"
            echo ""
            echo "- [ ] **Build and Push Docker Image** job가 성공했는지 확인"
            echo "- [ ] **Deploy to Local Server** step이 성공했는지 확인 (PR이면 배포 스킵)"
            echo "- [ ] 로컬에서 \`http://127.0.0.1:8000\` 접속 후 \`Ctrl + F5\`"
            echo "- [ ] 사람 사진 업로드 → 정상 결과"
            echo "- [ ] 사람 미검출 사진 업로드 → 에러 메시지 + 재업로드 유도"
            echo ""
            echo "### Where to look when deploy fails"
            echo "- \`docker: command not found\`: 러너에 Docker 설치/PATH 확인"
            echo "- \`pull access denied\`: Docker Hub 시크릿/권한 확인"
            echo "- \`port is already allocated\`: 8000 포트 충돌 확인"
            echo "- 컨테이너 로그: \`docker logs body-type-api-container\`"
          } >> \"$GITHUB_STEP_SUMMARY\"
