name: CI/CD Pipeline for Body Type MLOps API

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    
    steps:
      - name: 코드를 체크아웃합니다 (Checkout Code)
        uses: actions/checkout@v4

      - name: Docker Buildx를 설정합니다 (Set up Docker Buildx)
        # Buildx를 사용하면 GHA 캐시를 활용하여 빌드 속도를 크게 향상시킬 수 있습니다.
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub에 로그인합니다 (Login to Docker Hub)
        # Pull Request 시에는 이미지를 푸시하지 않으므로 로그인을 생략합니다.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Docker 이미지를 빌드하고 푸시합니다 (Build and Push Docker Image)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # push는 main 브랜치일 경우에만 수행되도록 설정
          push: ${{ github.event_name != 'pull_request' }}
          # Docker Hub 사용자명과 리포지토리 이름 조합
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/body-type-api:latest
          # GitHub Actions의 캐시를 사용하여 빌드 시간을 단축
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Local Self-Hosted Runner
    needs: build-and-push
    runs-on: self-hosted
    if: github.event_name != 'pull_request'
    
    steps:
      - name: 도커 로그인 (Docker Login)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: 최신 구동 환경으로 서버 재실행 시키기
        # Windows Runner에서 문법/명령어 호환성을 보장하기 위해 bash 쉘 사용을 강제합니다.
        shell: bash
        run: |
          echo "==== Docker Hub에서 최신 이미지 당겨오는 중... ===="
          docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/body-type-api:latest
          
          echo "==== 기존에 켜져있던 컨테이너 프로세스 끄고 삭제하는 중... ===="
          # 에러(기존 컨테이너가 없을 경우)가 발생해도 무시하고 다음 명령어로 넘어가게(true) 합니다.
          docker stop body-type-api-container || true
          docker rm body-type-api-container || true
          
          echo "==== 새로운 컨테이너 가동 중... ===="
          docker run -d --name body-type-api-container -p 8000:8000 ${{ secrets.DOCKER_HUB_USERNAME }}/body-type-api:latest
          
          echo "==== 로컬에서의 새로운 버전 배포 완료! ===="
